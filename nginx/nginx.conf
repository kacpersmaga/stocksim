events {
    worker_connections 1024;
}

http {
    upstream stockapp {
        least_conn;
        server app1:8080 fail_timeout=5s max_fails=3;
        server app2:8080 fail_timeout=5s max_fails=3;
        server app3:8080 fail_timeout=5s max_fails=3;
        keepalive 32;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://stockapp;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;

            # Retry on error/timeout but NOT for non-idempotent requests
            # (avoid double-trade on POST retry)
            proxy_next_upstream error timeout;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 5s;

            proxy_connect_timeout 3s;
            proxy_read_timeout 15s;
            proxy_send_timeout 15s;
        }

        location /healthz {
            proxy_pass http://stockapp;
            proxy_next_upstream error timeout;
            proxy_next_upstream_tries 3;
            access_log off;
        }
    }
}
