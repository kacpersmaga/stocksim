run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - godot
    - noctx
    - bodyclose
    - exportloopref

linters-settings:
  goimports:
    local-prefixes: github.com/remitly-task/stocksim
  godot:
    scope: declarations

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - unparam
