services:
  redis:
    image: redis:7.2-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app1:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      APP_PORT: "8080"
      REDIS_ADDR: "redis:6379"
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  app2:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      APP_PORT: "8080"
      REDIS_ADDR: "redis:6379"
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  app3:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      APP_PORT: "8080"
      REDIS_ADDR: "redis:6379"
    networks:
      - internal
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - internal
    depends_on:
      - app1
      - app2
      - app3
    restart: unless-stopped

volumes:
  redis_data:

networks:
  internal:
    driver: bridge
